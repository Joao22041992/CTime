<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Curso de linguagem C</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="imagenslogo.png" />
  </head>
  <body>
    <button id="menu-toggle" title="Alternar Menu">☰</button>
    <aside>
      <div class="logo">
        <img src="imagenslogo.png" alt="Logo C Time" style="max-width: 100%" />
      </div>
      <nav id="nav-menu">
        <!-- Menu gerado via JS -->
      </nav>
      <div class="user-stats">
        <div id="user-level">Nível: 1</div>
        <div id="user-xp">XP: 0 / 100</div>
      </div>
    </aside>

    <main>
      <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div id="content-area">
        <!-- Conteúdo injetado via JS -->
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
