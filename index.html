<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - C-Time</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="imagenslogo.png" />
    <style>
      body {
        background: linear-gradient(135deg, #1e1e1e 0%, #000000 100%);
        color: #d4d4d4;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI", sans-serif;
      }
      .login-card {
        background-color: rgba(37, 37, 38, 0.9);
        padding: 2.5rem;
        border-radius: 1rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        text-align: center;
        max-width: 400px;
        width: 90%;
        border: 1px solid #333;
        backdrop-filter: blur(10px);
      }
      .btn-google {
        background-color: #ffffff;
        color: #333;
        border: none;
        padding: 12px 20px;
        border-radius: 50px;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        transition: all 0.3s ease;
        margin-top: 20px;
      }
      .btn-google:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(255, 255, 255, 0.2);
        background-color: #f8f9fa;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <img
        src="imagenslogo.png"
        alt="Logo"
        class="img-fluid mb-4"
        style="max-height: 100px"
      />
      <h3 class="mb-2 text-white">
        Bem-vindo ao C-Ti<a
          href="indexDashboard.html"
          style="text-decoration: none; color: inherit"
          >m</a
        >e
      </h3>
      <p class="text-muted">Faça login para continuar seus estudos</p>

      <div id="login-area">
        <button id="btn-login" class="btn btn-google">
          <img
            src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
            alt="G"
            width="20"
          />
          Entrar com Google
        </button>
      </div>

      <div
        id="status-msg"
        class="mt-4 text-info fw-bold"
        style="display: none"
      ></div>
      <div id="error-msg" class="mt-4 text-danger" style="display: none"></div>
    </div>

    <script type="module">
      import { auth, provider, signInWithPopup } from "./firebase-config.js";
      import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

      const btnLogin = document.getElementById("btn-login");
      const statusMsg = document.getElementById("status-msg");
      const errorMsg = document.getElementById("error-msg");
      const loginArea = document.getElementById("login-area");

      // 1. Se já estiver logado, redireciona automaticamente (evita clique duplo)
      onAuthStateChanged(auth, (user) => {
        if (user) {
          loginArea.style.display = "none";
          statusMsg.style.display = "block";
          statusMsg.innerText = "Login confirmado! Redirecionando...";
          setTimeout(() => {
            window.location.href = "Pagina_inicial.html";
          }, 1000); // Pequeno delay para garantir que o navegador salvou a sessão
        }
      });

      // 2. Botão de Login
      btnLogin.addEventListener("click", async () => {
        try {
          // Feedback visual imediato
          loginArea.style.display = "none";
          statusMsg.style.display = "block";
          errorMsg.style.display = "none";
          statusMsg.innerText = "Aguardando Google...";

          // Abre o Popup
          const result = await signInWithPopup(auth, provider);

          // Se chegou aqui, deu certo. O onAuthStateChanged acima vai lidar com o redirecionamento.
          statusMsg.innerText = `Sucesso! Entrando como ${result.user.displayName}...`;
        } catch (error) {
          console.error("Erro no login:", error);

          // Restaura a tela de login em caso de erro
          loginArea.style.display = "block";
          statusMsg.style.display = "none";
          errorMsg.style.display = "block";

          if (error.code === "auth/popup-closed-by-user") {
            errorMsg.innerText = "Login cancelado. Tente novamente.";
          } else if (error.code === "auth/popup-blocked") {
            errorMsg.innerText =
              "Popup bloqueado. Por favor, permita popups para este site.";
          } else {
            errorMsg.innerText = "Erro: " + error.message;
          }
        }
      });
    </script>
  </body>
</html>
