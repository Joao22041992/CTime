<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>C-Time - Histórico de Acessos</title>

    <!-- OTIMIZAÇÃO DE CARREGAMENTO -->
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin />

    <script type="module">
      import { auth, db } from "./firebase-config.js";
      import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
      import { collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

      // Proteção da Página (Igual ao Dashboard)
      onAuthStateChanged(auth, (user) => {
        if (!user) {
          window.location.href = "loginDashboard.html";
        } else {
          const emailAdm = "joaomateus89@gmail.com";
          if (user.email !== emailAdm) {
            window.location.href = "loginDashboard.html";
          } else {
            loadHistory();
          }
        }
      });

      // Função para carregar histórico (Não precisa ser realtime, getDocs é suficiente)
      async function loadHistory() {
        const loadingMessage = document.getElementById("loading-message");
        const tbody = document.getElementById("history-list");
        
        try {
          // Busca os últimos 100 registros de acesso
          const q = query(collection(db, "user_logs"), orderBy("timestamp", "desc"), limit(100));
          const querySnapshot = await getDocs(q);

          tbody.innerHTML = "";
          
          if (querySnapshot.empty) {
            loadingMessage.textContent = "Nenhum histórico encontrado.";
            return;
          }

          loadingMessage.style.display = "none";

          querySnapshot.forEach((doc) => {
            const data = doc.data();
            // Formatação de data e hora
            let dateStr = "Data desconhecida";
            let timeStr = "--:--";
            
            if (data.timestamp) {
                const dateObj = data.timestamp.toDate();
                dateStr = dateObj.toLocaleDateString('pt-BR');
                timeStr = dateObj.toLocaleTimeString('pt-BR');
            }

            const row = document.createElement("tr");
            row.className = "border-b border-white/10 hover:bg-white/5 transition-colors";
            
            row.innerHTML = `
              <td class="p-4 font-medium text-white">${data.name || "Desconhecido"}</td>
              <td class="p-4 text-gray-300">${data.email || "-"}</td>
              <td class="p-4 text-blue-300">${dateStr}</td>
              <td class="p-4 text-blue-300 font-mono">${timeStr}</td>
            `;
            tbody.appendChild(row);
          });
        } catch (error) {
            console.error("Erro ao buscar histórico:", error);
            loadingMessage.textContent = "Erro ao carregar dados.";
        }
      }

      window.handleLogout = () => {
        signOut(auth).then(() => window.location.href = "index.html");
      };
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="imagenslogo.png" />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        min-height: 100vh;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
    </style>
  </head>
  <body class="text-gray-200 p-4 sm:p-6 md:p-8">
    <div class="max-w-6xl mx-auto">
      
      <!-- Cabeçalho -->
      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
        <div>
          <h1 class="text-3xl font-bold text-white flex items-center gap-2">
            <span>📜</span> Histórico de Logs
          </h1>
          <p class="text-gray-400 mt-1">Registro dos últimos 100 acessos à plataforma.</p>
        </div>
        
        <div class="flex gap-3">
            <a
                href="indexDashboard.html"
                class="bg-gray-700 hover:bg-gray-600 text-white font-semibold py-2 px-4 rounded-lg transition-all border border-gray-600"
            >
                ← Voltar ao Monitoramento
            </a>
            <button 
              onclick="handleLogout()"
              class="bg-red-500/20 hover:bg-red-500/40 text-red-100 border border-red-500/50 font-bold py-2 px-4 rounded-lg transition-all"
            >
              Sair
            </button>
        </div>
      </div>

      <!-- Tabela de Histórico -->
      <div class="glass-card rounded-2xl shadow-2xl overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-left">
            <thead class="bg-black/20 text-xs uppercase tracking-wider text-gray-400">
              <tr>
                <th class="p-4">Usuário</th>
                <th class="p-4">E-mail</th>
                <th class="p-4">Data</th>
                <th class="p-4">Hora do Login</th>
              </tr>
            </thead>
            <tbody id="history-list">
              <!-- Inserido via JS -->
            </tbody>
          </table>
        </div>
      </div>

      <div id="loading-message" class="text-center text-white mt-8 flex flex-col items-center">
        <div class="animate-spin h-8 w-8 border-4 border-blue-500 border-t-transparent rounded-full mb-2"></div>
        Carregando histórico...
      </div>

    </div>
  </body>
</html>
